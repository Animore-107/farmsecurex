<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FarmSecureX Dashboard</title>

<link rel="stylesheet" href="farmsecurex.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

</head>

<body>

<div class="main-layout">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
<i class="fa-solid fa-seedling"></i>
<h2>FarmSecureX</h2>
<p>Smart Agri Monitoring</p>
</div>

<ul class="menu">

<li onclick="showSection('home')">
<i class="fa-solid fa-house"></i> Home
</li>

<li onclick="showSection('continuity')">
<i class="fa-solid fa-link"></i> Cable Continuity
</li>

<li onclick="showSection('motor')">
<i class="fa-solid fa-gear"></i> Motor Movement
</li>

<li onclick="showSection('gps')">
<i class="fa-solid fa-location-dot"></i> GPS Location
</li>

<li onclick="showSection('maintenance')">
<i class="fa-solid fa-screwdriver-wrench"></i> Maintenance
</li>

</ul>

<button class="toggle" onclick="toggleMode()">
Theme
</button>

</div>


<!-- MAIN DASHBOARD -->

<div class="dashboard">

<div class="header">
<i class="fa-solid fa-shield-halved"></i>
Security Monitoring
</div>


<div class="container">

<!-- CONTINUITY -->

<div class="card">

<h3>Cable Continuity</h3>

<div class="status ok" id="continuityStatus">
OK
</div>

</div>


<!-- MOTOR -->

<div class="card">

<h3>Motor Movement</h3>

<div class="status moving" id="motorStatus">
SAFE
</div>

</div>


<!-- GPS -->

<div class="card">

<h3>Live Location</h3>

<a class="mapbtn"
id="mapButton"
href="#"
target="_blank">

Open Map

</a>

</div>


<!-- MAINTENANCE -->

<div class="card">

<h3>Maintenance Mode</h3>

<label class="switch">
<input type="checkbox" id="maintenanceSwitch">
<span class="slider"></span>
</label>

</div>

</div>

</div>

</div>


<!-- POPUP PANEL -->

<div id="popup" class="popup">

<div class="popup-content">

<span class="close" onclick="closePopup()">&times;</span>

<div id="popup-text"></div>

</div>

</div>


<script>

function toggleMode(){
document.body.classList.toggle("dark-mode");
}

function showSection(section){

const text = {

home:"FarmSecureX monitors agricultural equipment security in real time.",

continuity:"Cable continuity monitoring ensures communication lines are intact.",

motor:"Motor movement monitoring uses gyroscope sensors to detect movement.",

gps:"The GPS module provides real-time equipment location.",

maintenance:"Maintenance mode disables monitoring during inspection."

}

document.getElementById("popup-text").innerText = text[section];
document.getElementById("popup").style.display = "flex";

}

function closePopup(){
document.getElementById("popup").style.display = "none";
}


/* ==========================
FIREBASE CONFIG
========================== */

var firebaseConfig = {
apiKey: "API_KEY",
authDomain: "farmx-d22be.firebaseapp.com",
databaseURL: "https://farmx-d22be-default-rtdb.firebaseio.com",
projectId: "farmx-d22be",
storageBucket: "farmx-d22be.appspot.com",
messagingSenderId: "123456",
appId: "APP_ID"
};

firebase.initializeApp(firebaseConfig);

var db = firebase.database();


/* ==========================
READ CONTINUITY STATUS
========================== */

db.ref("farmsecurex/continuity").on("value", function(snapshot){

document.getElementById("continuityStatus").innerText = snapshot.val();

});


/* ==========================
READ MOTOR STATUS
========================== */

db.ref("farmsecurex/motor").on("value", function(snapshot){

document.getElementById("motorStatus").innerText = snapshot.val();

});


/* ==========================
READ GPS LOCATION
========================== */

db.ref("farmsecurex/gps").on("value", function(snapshot){

var data = snapshot.val();

var maplink = "https://maps.google.com/?q="+data.lat+","+data.lon;

document.getElementById("mapButton").href = maplink;

});


/* ==========================
MAINTENANCE SWITCH CONTROL
========================== */

document.getElementById("maintenanceSwitch")
.addEventListener("change", function(){

var state = this.checked;

firebase.database().ref("farmsecurex").update({
maintenance: state
});

});

</script>

</body>
</html>
