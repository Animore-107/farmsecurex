<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FarmSecureX Dashboard</title>

<link rel="stylesheet" href="farmsecurex.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div class="main-layout">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
<i class="fa-solid fa-seedling"></i>
<h2>FarmSecureX</h2>
<p>Smart Agri Monitoring</p>
</div>

<ul class="menu">

<li onclick="showSection('home')">
<i class="fa-solid fa-house"></i> Home
</li>

<li onclick="showSection('continuity')">
<i class="fa-solid fa-link"></i> Cable Continuity
</li>

<li onclick="showSection('motor')">
<i class="fa-solid fa-gear"></i> Motor Movement
</li>

<li onclick="showSection('gps')">
<i class="fa-solid fa-location-dot"></i> GPS Location
</li>

<li onclick="showSection('maintenance')">
<i class="fa-solid fa-screwdriver-wrench"></i> Maintenance
</li>

</ul>

<button class="toggle" onclick="toggleMode()">
Theme
</button>

</div>


<!-- MAIN CONTENT -->

<div class="dashboard">

<div class="header">
<i class="fa-solid fa-shield-halved"></i>
Security Monitoring
</div>


<div class="container">

<div class="card">

<h3>Cable Continuity</h3>

<div class="status ok">
OK
</div>

</div>


<div class="card">

<h3>Motor Movement</h3>

<div class="status moving">
MOVING
</div>

</div>


<div class="card">

<h3>Live Location</h3>

<a class="mapbtn"
href="https://maps.google.com/?q=18.5204,73.8567"
target="_blank">

Open Map

</a>

</div>


<div class="card">

<h3>Maintenance Mode</h3>

<label class="switch">
<input type="checkbox">
<span class="slider"></span>
</label>

</div>

</div>

</div>

</div>


<!-- POPUP PANEL -->

<div id="popup" class="popup">

<div class="popup-content">

<span class="close" onclick="closePopup()">&times;</span>

<div id="popup-text"></div>

</div>

</div>


<script>

function toggleMode(){
document.body.classList.toggle("dark-mode");
}

function showSection(section){

const text = {

home:"FarmSecureX is a smart agricultural security monitoring system designed to monitor cable continuity, motor movement and equipment location in real time.",

continuity:"Cable continuity monitoring ensures that the wiring and communication lines in the system are intact and not damaged.",

motor:"Motor movement monitoring uses gyroscope sensors to detect whether the motor is moving or stationary.",

gps:"The GPS module provides live location tracking of the equipment using satellite positioning.",

maintenance:"Maintenance mode disables the monitoring system temporarily for inspection or servicing."

}

document.getElementById("popup-text").innerText = text[section];

document.getElementById("popup").style.display = "flex";

}

function closePopup(){

document.getElementById("popup").style.display = "none";

}

</script>

</body>
</html>
